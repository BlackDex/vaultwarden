---
name: playwright

# Internal network for docker-proxy
networks:
  default:
    driver: bridge
    ipam:
      config:
        - subnet: "100.100.234.0/24"
          gateway: "100.100.234.1"

# Shared volumes
volumes:
  certs:
  config:

services:
  cert_gen:
    profiles: ["init"]
    restart: no
    container_name: cert_gen
    image: alpine/openssl:latest
    cap_drop:
      - ALL
    # user: 1000:1000
    env_file: ca.env
    cap_add:
      - CAP_DAC_OVERRIDE
    security_opt:
      - no-new-privileges
    volumes:
      - certs:/certs
      - "${CA_OVERRIDE_CRT:-/dev/null}:/certs/ca-override.crt:ro"
      - "${CA_OVERRIDE_KEY:-/dev/null}:/certs/ca-override.key:ro"
      - ./scripts/generate-certs.sh:/generate-certs.sh:ro
    entrypoint: ["sh", "/generate-certs.sh"]

  docker_proxy:
    container_name: docker_proxy
    image: ghcr.io/wollomatic/socket-proxy:1
    group_add:
      - "${DOCKER_GID:-0}"
    user: "65534:${DOCKER_GID:-0}"
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges
    volumes:
      - "${DOCKER_SOCKET:-/var/run/docker.sock}:/var/run/docker.sock:ro"
    ports:
      - 100.100.234.1:2375:2375/tcp
    command:
      - '-loglevel=debug'
      - '-listenip=0.0.0.0'
      - '-allowfrom=100.100.234.1'
      - '-allowGET=/(version|containers/.*)'
      - '-allowPOST=/containers/[a-zA-Z0-9_.-]+/(stop|start)'

  vaultwarden:
    container_name: vaultwarden
    build:
      context: ../.. # project root where the Vaultwarden Dockerfile lives
      dockerfile: Dockerfile
      args:
        CARGO_PROFILE: dev
    volumes:
      - certs:/certs:ro
      - config:/config:ro
    environment:
      ENV_FILE: /config/.env
      LOG_LEVEL: info
      ROCKET_PORT: 8003
      DOMAIN: https://localhost:8003
      SSL_CERT_FILE: /certs/ca.crt
      ROCKET_TLS: '{certs="/certs/server.crt",key="/certs/server.key"}'
      LOGIN_RATELIMIT_MAX_BURST: 100
      ADMIN_TOKEN: admin
    ports:
      - 127.0.0.1:8003:8003/tcp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges
    healthcheck:
      test: [CMD-SHELL, "/healthcheck.sh"]
      interval: 2s
      timeout: 5s
      retries: 10
      start_period: 5s

  mailpit:
    container_name: mailpit
    image: axllent/mailpit:latest
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges
    environment:
      MP_QUIET: "true"
      # MP_VERBOSE: "true"
      MP_DISABLE_WAL: "true"
      MP_SMTP_DISABLE_RDNS: "true"
      MP_ALLOW_UNTRUSTED_TLS: "true"
      MP_DISABLE_VERSION_CHECK: "true"
      MP_SMTP_AUTH_ACCEPT_ANY: "true"
      MP_SMTP_AUTH_ALLOW_INSECURE: "true"
      MP_SMTP_BIND_ADDR: "0.0.0.0:1026"
      MP_UI_BIND_ADDR: "0.0.0.0:8026"
    ports:
      - 127.0.0.1:8026:8026/tcp
      - 127.0.0.1:1026:1026/tcp

  playwright:
    container_name: playwright
    network_mode: host
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges
    build:
      context: ..
    depends_on:
      vaultwarden:
        condition: service_started
      mailpit:
        condition: service_healthy
      docker_proxy:
        condition: service_started
    volumes:
      - certs:/certs:ro
      - ../test-results:/app/test-results
      # Vaultwarden Config for .env adjustments
      - config:/config:rw
    environment:
      # NODE_TLS_REJECT_UNAUTHORIZED: 0
      DOCKER_HOST: tcp://docker_proxy:2375
      VAULTWARDEN_URL: https://localhost:8003
      MAILPIT_API_URL: http://mailpit:8026
      SSO_ISSUER_URL: https://dex:5556/dex
      NODE_EXTRA_CA_CERTS: /certs/ca.crt
      SSL_CERT_FILE: /certs/ca.crt
    extra_hosts:
      - "vaultwarden:127.0.0.1"
      - "docker_proxy:100.100.234.1"
      - "mailpit:127.0.0.1"
      - "dex:127.0.0.1"
