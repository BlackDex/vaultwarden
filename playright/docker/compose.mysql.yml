---
volumes:
  playwright_mysql_data:

services:
  mysql:
    container_name: playwright_mysql
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: testdb
      MYSQL_USER: testuser
      MYSQL_PASSWORD: testpass
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 15
    volumes:
      - playwright_mysql_data:/var/lib/mysql/

  vaultwarden:
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      DATABASE_URL: "mysql://testuser:testpass@playwright_mysql:3306/testdb"

  playwright:
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - playwright_mysql_data:/dbdata
    environment:
      DB_TYPE: mysql
