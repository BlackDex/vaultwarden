services:
  VaultwardenPrebuild:
    profiles: ["playwright", "vaultwarden"]
    container_name: playwright_oidc_vaultwarden_prebuilt
    image: playwright_oidc_vaultwarden_prebuilt
    build:
      context: ..
      dockerfile: Dockerfile
      args:
        CARGO_PROFILE: dev
    entrypoint: /bin/bash
    restart: "no"

  cert_generator:
    image: alpine:latest
    profiles: ["playwright", "vaultwarden", "keycloak"]
    container_name: cert_generator
    volumes:
      - ./certs:/ssl:rw
    command:
      - /bin/sh
      - -c
      - |
        apk add --no-cache openssl ca-certificates
        ls -al /ssl/
        if [ ! -f /ssl/cert.pem ]; then
          openssl req -x509 -newkey rsa:4096 -nodes -days 365 \
            -keyout /ssl/key.pem \
            -out /ssl/cert.pem \
            -subj '/C=EU/ST=Test/L=Test/O=Vaultwarden/CN=localhost' \
            -addext 'subjectAltName=DNS:localhost,DNS:vaultwarden,DNS:keycloak,IP:127.0.0.1'
          ls -al /ssl/
          echo -ne "" \
          base64 -d > /ssl/mitmproxy.pem
          ls -al /ssl/
          cat /ssl/cert.pem /ssl/mitmproxy.pem /etc/ssl/certs/ca-certificates.crt > /ssl/ca-certificates.crt
          cat /ssl/ca-certificates.crt
          ls -al /ssl/
          echo 'Certificates generated'
        else
          echo 'Certificates already exist'
        fi
        chmod 0755 /ssl
        chmod 0644 /ssl/*
    restart: "no"

  Vaultwarden:
    profiles: ["playwright", "vaultwarden"]
    container_name: playwright_oidc_vaultwarden-${ENV:-dev}
    image: playwright_oidc_vaultwarden-${ENV:-dev}
    network_mode: "host"
    volumes:
      - ./certs/:/ssl:ro
      - ./certs/cert.pem:/etc/ssl/certs/vwcacert.pem:ro
      - ./certs/mitmproxy.pem:/etc/ssl/certs/mitmproxy.pem:ro
      - ./certs/ca-certificates.crt:/etc/ssl/certs/ca-certificates.crt:ro
    build:
      context: compose/warden
      dockerfile: Dockerfile
      args:
        REPO_URL: ${PW_VW_REPO_URL:-}
        COMMIT_HASH: ${PW_VW_COMMIT_HASH:-}
    env_file: ${DC_ENV_FILE:-.env}
    environment:
      - ADMIN_TOKEN
      - DATABASE_URL
      - I_REALLY_WANT_VOLATILE_STORAGE
      - LOG_LEVEL
      - LOGIN_RATELIMIT_MAX_BURST
      - SMTP_HOST
      - SMTP_FROM
      - SMTP_DEBUG
      - SSO_DEBUG_TOKENS
      - SSO_ENABLED
      - SSO_FRONTEND
      - SSO_ONLY
      - SSO_SCOPES
      - DOMAIN
      - ROCKET_TLS
      - SSL_CERT_DIR=/etc/ssl/certs/
      # - SSL_CERT_FILE=/etc/ssl/certs/mitmproxy.pem
      - HTTPS_PROXY=socks5://127.0.0.1:3128
    restart: "no"
    depends_on:
      VaultwardenPrebuild:
        condition: service_completed_successfully
      cert_generator:
        condition: service_completed_successfully

  Playwright:
    profiles: ["playwright"]
    container_name: playwright_oidc_playwright
    image: playwright_oidc_playwright
    network_mode: "host"
    build:
      context: .
      dockerfile: compose/playwright/Dockerfile
      target: test
    environment:
      - NODE_TLS_REJECT_UNAUTHORIZED=0
      - PW_WV_REPO_URL
      - PW_WV_COMMIT_HASH
      - COMPOSE_PROGRESS
    restart: "no"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ..:/project

  PlaywrightCodegen:
    profiles: ["codegen"]
    container_name: playwright_oidc_codegen
    image: playwright_oidc_codegen
    network_mode: "host"
    build:
      context: .
      dockerfile: compose/playwright/Dockerfile
      target: codegen
    environment:
      - NODE_TLS_REJECT_UNAUTHORIZED=0
      - DISPLAY=:99
      - VNC_PORT=5900
      - NOVNC_PORT=6080
      - SCREEN_RES=1920x1080
      - COMPOSE_PROGRESS
    restart: "no"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ..:/project


  Mariadb:
    profiles: ["playwright"]
    container_name: playwright_mariadb
    image: mariadb:12-noble
    env_file: ${DC_ENV_FILE:-.env}
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      start_period: 10s
      interval: 10s
    ports:
      - ${MARIADB_PORT}:3306

  Mysql:
    profiles: ["playwright"]
    container_name: playwright_mysql
    image: mysql:8
    env_file: ${DC_ENV_FILE:-.env}
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      start_period: 10s
      interval: 10s
    ports:
      - ${MYSQL_PORT}:3306

  Postgres:
    profiles: ["playwright"]
    container_name: playwright_postgres
    image: postgres:18
    env_file: ${DC_ENV_FILE:-.env}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d $${POSTGRES_DB} -U $${POSTGRES_USER}"]
      start_period: 20s
      interval: 30s
    ports:
      - ${POSTGRES_PORT}:5432

  Keycloak:
    profiles: ["keycloak", "vaultwarden"]
    container_name: keycloak-${ENV:-dev}
    image: quay.io/keycloak/keycloak:26.5.4
    network_mode: "host"
    volumes:
      - ./certs/:/ssl:ro
      - ./certs/cert.pem:/etc/ssl/certs/vwcacert.pem:ro
      - ./certs/mitmproxy.pem:/etc/ssl/certs/mitmproxy.pem:ro
      - ./certs/ca-certificates.crt:/etc/ssl/certs/ca-certificates.crt:ro
    command:
      - start-dev
    env_file: ${DC_ENV_FILE:-.env}
    environment:
      - SSL_CERT_DIR=/etc/ssl/certs/
      - KC_HTTPS_CERTIFICATE_FILE=/ssl/cert.pem
      - KC_HTTPS_CERTIFICATE_KEY_FILE=/ssl/key.pem
    depends_on:
      cert_generator:
        condition: service_completed_successfully

  KeycloakSetup:
    profiles: ["keycloak", "vaultwarden"]
    container_name: keycloakSetup-${ENV:-dev}
    image: keycloak_setup-${ENV:-dev}
    volumes:
      - ./certs/:/ssl:ro
      - ./certs/cert.pem:/etc/ssl/certs/vwcacert.pem:ro
      - ./certs/mitmproxy.pem:/etc/ssl/certs/mitmproxy.pem:ro
      - ./certs/ca-certificates.crt:/etc/ssl/certs/ca-certificates.crt:ro
    environment:
      - SSL_CERT_DIR=/etc/ssl/certs/
    build:
      context: compose/keycloak
      dockerfile: Dockerfile
      args:
        KEYCLOAK_VERSION: 26.5.4
    network_mode: "host"
    depends_on:
      - Keycloak
    restart: "no"
    env_file: ${DC_ENV_FILE:-.env}
